<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; margin: 0; background: #fff; color: #333; font-size: 12px; }
    .hidden { display: none; }
    h2 { font-size: 15px; font-weight: 700; margin-bottom: 15px; }
    
    /* Boutons */
    button { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: none; background: #181818; color: #fff; font-weight: 600; width: 100%; }
    button:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: #181818; border: 1px solid #ddd; margin-top: 8px; }
    
    /* Style for the Clear Button */
    .btn-danger { background: none; color: #f24822; border: 1px solid #f24822; margin-top: 20px; font-size: 11px; }
    .btn-danger:hover { background: #fff5f3; }

    /* Tags & Labels */
    .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag { padding: 4px 10px; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; background: #f9f9f9; font-size: 11px; }
    .tag.active { background: #181818; color: #fff; border-color: #181818; }
    label { font-size: 11px; font-weight: 700; display: block; margin-top: 15px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Grille d'Intents */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 80px; padding-top: 5px; }
    .card { background: #fff; border-radius: 6px; padding: 6px; border: 1px solid #eee; position: relative; cursor: pointer; overflow: hidden; }
    .card.selected { border-color: #007AFF; background: #F0F7FF; box-shadow: 0 0 0 1px #007AFF; }
    .card img { width: 100%; border-radius: 3px; height: 75px; object-fit: cover; background: #f0f0f0; display: block; }
    .card-label { font-size: 10px; font-weight: 600; margin-top: 5px; text-align: center; }
    
    /* Sticky Navigation */
    .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 12px; border-top: 1px solid #eee; display: flex; gap: 10px; z-index: 100; }
    
    textarea, input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; margin-top: 5px; box-sizing: border-box; }
    hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
  </style>
</head>
<body>

  <div id="step-0">
    <h2>Straxy Annotator</h2>
    <button onclick="showFlow('motion')">Motion Intent</button>
    <button class="btn-secondary" onclick="showFlow('link')">Link & Media</button>
    
    <hr>
    <button class="btn-danger" onclick="clearData()">Clear All Annotations</button>
  </div>

  <div id="flow-link" class="hidden">
    <h2>🔗 Link Intent</h2>
    <label>Type</label>
    <div class="tag-group" id="link-types">
      <div class="tag active" onclick="setLinkType('URL')">URL</div>
      <div class="tag" onclick="setLinkType('Video')">Video</div>
      <div class="tag" onclick="setLinkType('Audio')">Audio</div>
    </div>
    <label>Destination</label>
    <input type="text" id="link-dest" placeholder="URL or TBD">
    <label>Indications</label>
    <textarea id="link-info" rows="3" placeholder="Notes..."></textarea>
    <div class="sticky-footer">
      <button class="btn-secondary" style="width: 40%;" onclick="restart()">Prev.</button>
      <button style="width: 60%;" onclick="addLink()">Add</button>
    </div>
  </div>

  <div id="flow-motion-1" class="hidden">
    <h2>🎬 Select Motion (Max 2)</h2>
    <div class="grid" id="motion-grid">Loading...</div>
    <div class="sticky-footer">
      <button class="btn-secondary" style="width: 40%;" onclick="restart()">Prev.</button>
      <button id="btn-next" style="width: 60%;" onclick="showFlow('motion-2')" disabled>Next</button>
    </div>
  </div>

  <div id="flow-motion-2" class="hidden">
    <h2>⚙️ Properties</h2>
    <label>Speed</label>
    <div class="tag-group" id="speed-tags">
      <div class="tag active" data-val="standard">standard</div>
      <div class="tag" data-val="instant">instant</div>
      <div class="tag" data-val="fast">fast</div>
      <div class="tag" data-val="slow">slow</div>
      <div class="tag" data-val="extra-slow">extra-slow</div>
    </div>
    <label>Behavior</label>
    <div class="tag-group" id="behavior-tags">
      <div class="tag active" data-val="ease-out-back">ease-out-back</div>
      <div class="tag" data-val="bounce-standard">bounce-standard</div>
      <div class="tag" data-val="emphasize">emphasize</div>
    </div>
    <label>Indications</label>
    <textarea id="motion-info" rows="3" placeholder="Notes..."></textarea>
    <div class="sticky-footer">
      <button class="btn-secondary" style="width: 40%;" onclick="showFlow('motion')">Prev.</button>
      <button style="width: 60%;" onclick="addMotion()">Add</button>
    </div>
  </div>

  <div id="step-confirm" class="hidden" style="text-align:center; padding-top:40px;">
    <div style="font-size:32px;">✅</div>
    <h2>Added!</h2>
    <button class="btn-secondary" onclick="restart()">Restart</button>
  </div>

  <script>
    let registry = [];
    let selectedIntents = [];
    let currentLinkType = 'URL';

    fetch('https://raw.githubusercontent.com/StraxyCo/d2c-annotation-figma-plugin/main/data/motion-registry.json')
      .then(res => res.json())
      .then(data => {
        registry = data.motions;
        renderGrid();
      });

    function renderGrid() {
      const grid = document.getElementById('motion-grid');
      const intents = registry.filter(m => 
        !m.id.startsWith('motion-') && 
        !['ease-out-back', 'bounce-standard', 'emphasize'].includes(m.id)
      );

      grid.innerHTML = intents.map(m => {
        const cleanName = m.label.replace(/^(Intent:|GSAP:)\s*/i, '');
        return `
          <div class="card" id="card-${m.id}" onclick="toggleIntent('${m.id}')">
            <img src="${m.gif_url}" onerror="this.src='https://via.placeholder.com/150/f0f0f0/999999?text=Preview'">
            <div class="card-label">${cleanName}</div>
          </div>
        `;
      }).join('');
    }

    function toggleIntent(id) {
      const idx = selectedIntents.indexOf(id);
      if (idx > -1) selectedIntents.splice(idx, 1);
      else if (selectedIntents.length < 2) selectedIntents.push(id);
      
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      selectedIntents.forEach(id => document.getElementById(`card-${id}`)?.classList.add('selected'));
      document.getElementById('btn-next').disabled = selectedIntents.length === 0;
    }

    function showFlow(flow) {
      document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
      if(flow === 'motion') document.getElementById('flow-motion-1').classList.remove('hidden');
      if(flow === 'motion-2') document.getElementById('flow-motion-2').classList.remove('hidden');
      if(flow === 'link') document.getElementById('flow-link').classList.remove('hidden');
      if(flow === 'confirm') document.getElementById('step-confirm').classList.remove('hidden');
      if(flow === '0') document.getElementById('step-0').classList.remove('hidden');
    }

    function setLinkType(type) {
      currentLinkType = type;
      document.querySelectorAll('#link-types .tag').forEach(t => t.classList.toggle('active', t.innerText === type));
    }

    document.querySelectorAll('.tag-group').forEach(group => {
      group.addEventListener('click', e => {
        if(e.target.classList.contains('tag') && group.id !== 'link-types') {
          group.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
        }
      });
    });

    function addLink() {
      const dest = document.getElementById('link-dest').value || 'TBD';
      const info = document.getElementById('link-info').value;
      parent.postMessage({ pluginMessage: { type: 'add-link', data: { type: currentLinkType, dest, info } } }, '*');
      showFlow('confirm');
    }

    function addMotion() {
      const speed = document.querySelector('#speed-tags .active').dataset.val;
      const behavior = document.querySelector('#behavior-tags .active').dataset.val;
      const info = document.getElementById('motion-info').value;
      parent.postMessage({ pluginMessage: { type: 'add-motion', data: { intents: selectedIntents, speed, behavior, info } } }, '*');
      showFlow('confirm');
    }

    // New Clear function for the button
    function clearData() {
      parent.postMessage({ pluginMessage: { type: 'clear-data' } }, '*');
    }

    function restart() {
      selectedIntents = [];
      document.querySelectorAll('input, textarea').forEach(i => i.value = '');
      document.getElementById('btn-next').disabled = true;
      showFlow('0');
    }
  </script>
</body>
</html>
